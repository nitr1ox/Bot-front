<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK-47 Bot — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07080d;
  --surface: #0e0f17;
  --raised:  #13141f;
  --border:  rgba(255,255,255,0.07);
  --accent:  #5865f2;
  --pink:    #e040a0;
  --green:   #3ecf8e;
  --red:     #e5484d;
  --text:    #f0f0f8;
  --sub:     #8b8b9e;
  --muted:   #4a4a5e;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'DM Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
  --r:       12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none; z-index: 0; opacity: 0.5;
}

.ambient {
  position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse at 50% 0%, rgba(88,101,242,0.18) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}
.ambient2 {
  position: fixed; bottom: -200px; right: -100px;
  width: 500px; height: 400px;
  background: radial-gradient(ellipse at 80% 100%, rgba(224,64,160,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  margin: 20px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  animation: slideUp 0.4s cubic-bezier(0.34,1.2,0.64,1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
}
.logo-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 20px rgba(88,101,242,0.35);
}
.logo-text {
  font-family: var(--display);
  font-size: 1.8rem;
  letter-spacing: 0.04em;
  line-height: 1;
}
.logo-text span { color: var(--accent); }
.logo-sub {
  font-size: 0.65rem;
  font-family: var(--mono);
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.1em;
}

.tab-row {
  display: flex;
  background: var(--raised);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 28px;
}
.tab {
  flex: 1; padding: 8px;
  text-align: center;
  font-size: 0.8rem;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  color: var(--sub);
  transition: all 0.2s;
  border: none; background: none;
  font-family: var(--sans);
}
.tab.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 10px rgba(88,101,242,0.4);
}

.field { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--sub);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 7px;
  font-family: var(--mono);
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 11px 14px;
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: rgba(88,101,242,0.5);
  box-shadow: 0 0 0 3px rgba(88,101,242,0.1);
}
.field input::placeholder { color: var(--muted); }

.btn-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--r);
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.18s;
  box-shadow: 0 4px 16px rgba(88,101,242,0.35);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: 0.01em;
}
.btn-submit:hover { background: #4752c4; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(88,101,242,0.45); }
.btn-submit:active { transform: scale(0.99); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.spin {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.loading .spin { display: block; }
.loading .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: rgba(229,72,77,0.1);
  border: 1px solid rgba(229,72,77,0.25);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: var(--red);
  margin-bottom: 16px;
  font-family: var(--mono);
  display: none;
}
.error-box.show { display: block; }

.success-box {
  background: rgba(62,207,142,0.1);
  border: 1px solid rgba(62,207,142,0.25);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: var(--green);
  margin-bottom: 16px;
  font-family: var(--mono);
  display: none;
}
.success-box.show { display: block; }

.footer-note {
  text-align: center;
  margin-top: 20px;
  font-size: 0.68rem;
  color: var(--muted);
  font-family: var(--mono);
}
.footer-note a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="ambient2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⚡</div>
    <div>
      <div class="logo-text">AK-<span>47</span></div>
      <div class="logo-sub">BOT MANAGER</div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
  </div>

  <div id="error-box" class="error-box"></div>
  <div id="success-box" class="success-box"></div>

  <div class="field">
    <label class="field-label">Nom d'utilisateur</label>
    <input type="text" id="username" placeholder="monpseudo" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>
  <div class="field">
    <label class="field-label">Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submit()">
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submit()">
    <div class="spin"></div>
    <span class="btn-label" id="btn-label">Se connecter</span>
  </button>

  <div class="footer-note">
    AK-47 Bot Manager v1.0 — <a href="#">bot.ak-47.fr</a>
  </div>
</div>

<script>
const API = window.location.origin + '/api';

let mode = 'login';

function switchTab(t) {
  mode = t;
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-register').classList.toggle('active', t === 'register');
  document.getElementById('btn-label').textContent = t === 'login' ? 'Se connecter' : 'Créer un compte';
  clearMessages();
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('success-box').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('success-box');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('error-box').classList.remove('show');
}
function clearMessages() {
  document.getElementById('error-box').classList.remove('show');
  document.getElementById('success-box').classList.remove('show');
}

async function submit() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  if (!username || !password) { showError('Remplis tous les champs'); return; }

  btn.classList.add('loading');
  btn.disabled = true;
  clearMessages();

  try {
    const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Erreur serveur');
    } else {
      localStorage.setItem('ak47_token', data.token);
      localStorage.setItem('ak47_user', JSON.stringify({ id: data.id, username: data.username }));
      showSuccess(mode === 'login' ? '✓ Connexion réussie, redirection…' : '✓ Compte créé, redirection…');
      setTimeout(() => window.location.href = '/dashboard.html', 700);
    }
  } catch {
    showError('Impossible de joindre le serveur');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// Redirect if already logged in
(async () => {
  const token = localStorage.getItem('ak47_token');
  if (!token) return;
  try {
    const r = await fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (r.ok) {
      window.location.href = '/dashboard.html';
    } else {
      // Token invalide ou expiré → on nettoie
      localStorage.removeItem('ak47_token');
      localStorage.removeItem('ak47_user');
    }
  } catch {
    // Erreur réseau → on nettoie pour éviter une boucle
    localStorage.removeItem('ak47_token');
    localStorage.removeItem('ak47_user');
  }
})();
</script>
</body>
</html>
